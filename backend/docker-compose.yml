services:
  mysql:
    image: mysql:8.4
    container_name: bridgeability-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rongzhiqiao}
      MYSQL_USER: ${MYSQL_USER:-bridgeability}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: ${TZ:-Asia/Taipei}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
    container_name: bridgeability-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-rongzhiqiao}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Taipei&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-bridgeability}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE:-always}
      APP_STORAGE_PROVIDER: local
      APP_STORAGE_LOCAL_ROOT: /app/uploads
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_PRIVACY_ENCRYPTION_SECRET: ${APP_PRIVACY_ENCRYPTION_SECRET:?APP_PRIVACY_ENCRYPTION_SECRET is required}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-BridgeAbility}
      APP_TIMEZONE: ${TZ:-Asia/Taipei}
      TZ: ${TZ:-Asia/Taipei}
      JAVA_OPTS: ${JAVA_OPTS:--XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=50.0}
    volumes:
      - ./config:/app/config:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8081}:8081"

volumes:
  mysql-data:
